<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - GrowthX Arabia</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="admin-wrapper">
    <!-- Login Form -->
    <div id="login-form" class="admin-login">
      <div class="admin-login-card glass-card">
        <div class="admin-login-header">
          <a href="index.html" class="navbar-brand">GrowthX Arabia</a>
          <h1>Admin Login</h1>
          <p>Sign in to access the dashboard</p>
        </div>
        <form onsubmit="adminLogin(event)">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="Enter username">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password">
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Sign In</button>
        </form>
      </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-content" class="admin-dashboard" style="display: none;">
      <!-- Admin Header -->
      <header class="admin-header">
        <div class="container">
          <div class="admin-header-content">
            <div class="admin-header-left">
              <a href="index.html" class="navbar-brand">GrowthX Arabia</a>
              <h1>Admin Dashboard</h1>
            </div>
            <button onclick="adminLogout()" class="btn btn-outline">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              Logout
            </button>
          </div>
        </div>
      </header>

      <!-- Stats Cards -->
      <section class="admin-stats">
        <div class="container">
          <div class="stats-grid">
            <div class="stat-card glass-card">
              <div class="stat-card-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
              </div>
              <div class="stat-card-content">
                <h3>Total Leads</h3>
                <div class="stat-value" id="stat-leads">0</div>
              </div>
            </div>
            <div class="stat-card glass-card">
              <div class="stat-card-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
              </div>
              <div class="stat-card-content">
                <h3>Total Contacts</h3>
                <div class="stat-value" id="stat-contacts">0</div>
              </div>
            </div>
            <div class="stat-card glass-card">
              <div class="stat-card-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
              </div>
              <div class="stat-card-content">
                <h3>Newsletter Subscribers</h3>
                <div class="stat-value" id="stat-newsletters">0</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Tab Navigation -->
      <section class="admin-content-section">
        <div class="container">
          <div class="admin-tabs">
            <button class="admin-tab active" data-tab="leads" onclick="switchTab('leads')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
              </svg>
              Leads
            </button>
            <button class="admin-tab" data-tab="contacts" onclick="switchTab('contacts')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
              Contacts
            </button>
            <button class="admin-tab" data-tab="newsletters" onclick="switchTab('newsletters')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
              Newsletter
            </button>
          </div>

          <!-- Table Container -->
          <div id="table-container" class="admin-table-container">
            <p class="admin-loading">Loading data...</p>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initAdmin();
    });
  </script>
</body>
</html>
